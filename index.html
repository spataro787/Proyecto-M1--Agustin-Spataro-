<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Colorfly Studio</title>
  <link rel="stylesheet" href="./css/style.css"/>
</head>

<body>

  <div class="app">

    <!-- IZQUIERDA (APP PRINCIPAL) -->
    <div class="contenido">
      
      <h1>Colorfly Studio</h1>
      <h2>Generador de Paletas</h2>

      <main>
        <section>

          <h3>Paletas</h3>

          <!-- Selector cantidad -->
          <label for="cantidad">Cantidad de colores:</label>
          <select id="cantidad">
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="9">9</option>
          </select>

          <!-- Botones -->
          <div class="acciones">
            <button id="BotonColor">Generar Paleta</button>
            <button id="guardar">Guardar Paleta</button>
          </div>

          <!-- Formato -->
          <label for="formato">Formato:</label>
          <select id="formato">
            <option value="hsl">HSL</option>
            <option value="hex">HEX</option>
          </select>

          <!-- Paleta -->
          <div id="paleta"></div>

        </section>
      </main>

    </div>

    
    <aside class="sidebar">
      <h3>Paletas guardadas</h3>
      <div id="favoritas"></div>
    </aside>

  </div>

  <script src="./js/script.js"></script>

</body>
</html>
